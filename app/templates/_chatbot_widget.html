
{% if current_user %}
<div id="chatbotWidget" class="chatbot-widget">
  
  <button type="button" id="chatbotToggle" class="chatbot-toggle" aria-label="Open AI Assistant">
    <span class="chatbot-icon">🐾</span>
    <span class="chatbot-icon-close">✕</span>
  </button>

  
  <div id="chatbotWindow" class="chatbot-window">
    
    <div class="chatbot-header">
      <div class="chatbot-header-content">
        <span class="chatbot-avatar">🤖</span>
        <div>
          <strong>AI Pet Care Assistant</strong>
          <small>Ask me about grooming, vaccinations, and pet care!</small>
        </div>
      </div>
      <button type="button" class="chatbot-close" aria-label="Close chat" onclick="toggleChatbotWidget(false)">
        ✕
      </button>
    </div>

    
    <div id="chatbotMessages" class="chatbot-messages">
      <div class="chat-bubble assistant">
        👋 Hi! I'm your AI Pet Care Assistant. Ask me anything about grooming, vaccinations, breed-specific care, or pet health!
      </div>
    </div>

    
    <div id="chatbotStatus" class="chatbot-status" style="display: none;">
      <span class="typing-dots">
        <span></span>
        <span></span>
        <span></span>
      </span>
      <span>AI is thinking...</span>
    </div>

    
    <div class="chatbot-input-container">
      <form id="chatbotForm" class="chatbot-form">
        <input
          type="text"
          id="chatbotInput"
          class="chatbot-input"
          placeholder="Ask about grooming, vaccinations, etc..."
          autocomplete="off"
          maxlength="500"
        />
        <button type="submit" id="chatbotSend" class="chatbot-send" aria-label="Send message">
          <span>➤</span>
        </button>
      </form>
    </div>
  </div>
</div>

<style>
/* ============================================
   FLOATING CHATBOT WIDGET STYLES
   ============================================ */

.chatbot-widget {
  position: fixed;
  bottom: 20px;
  right: 20px;
  z-index: 9998;
  font-family: 'Inter', 'Poppins', sans-serif;
}

/* Floating Toggle Button */
.chatbot-toggle {
  width: 64px;
  height: 64px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--primary) 0%, var(--primary-strong) 100%);
  color: #ffffff;
  border: none;
  cursor: pointer;
  box-shadow: 0 8px 24px rgba(42, 157, 143, 0.4);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.8rem;
  transition: all 0.3s ease;
  position: relative;
  overflow: hidden;
}

.chatbot-toggle:hover {
  transform: scale(1.1);
  box-shadow: 0 12px 32px rgba(42, 157, 143, 0.5);
}

.chatbot-toggle:active {
  transform: scale(0.95);
}

.chatbot-icon,
.chatbot-icon-close {
  position: absolute;
  transition: all 0.3s ease;
}

.chatbot-icon {
  opacity: 1;
  transform: rotate(0deg) scale(1);
}

.chatbot-icon-close {
  opacity: 0;
  transform: rotate(90deg) scale(0);
  font-size: 1.5rem;
}

.chatbot-toggle.active .chatbot-icon {
  opacity: 0;
  transform: rotate(-90deg) scale(0);
}

.chatbot-toggle.active .chatbot-icon-close {
  opacity: 1;
  transform: rotate(0deg) scale(1);
}

/* Chat Window */
.chatbot-window {
  position: absolute;
  bottom: 80px;
  right: 0;
  width: 400px;
  max-width: calc(100vw - 40px);
  height: 600px;
  max-height: calc(100vh - 120px);
  background: var(--surface);
  border-radius: 24px;
  box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
  display: none;
  flex-direction: column;
  overflow: hidden;
  animation: chatbotSlideUp 0.3s ease;
  border: 1px solid var(--line);
}

.chatbot-window.active {
  display: flex;
}

@keyframes chatbotSlideUp {
  from {
    opacity: 0;
    transform: translateY(20px) scale(0.95);
  }
  to {
    opacity: 1;
    transform: translateY(0) scale(1);
  }
}

/* Header */
.chatbot-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 1.2rem 1.5rem;
  background: linear-gradient(135deg, var(--primary) 0%, var(--primary-strong) 100%);
  color: #ffffff;
  border-bottom: 1px solid rgba(255, 255, 255, 0.1);
}

.chatbot-header-content {
  display: flex;
  align-items: center;
  gap: 0.75rem;
  flex: 1;
}

.chatbot-avatar {
  font-size: 2rem;
  line-height: 1;
}

.chatbot-header strong {
  display: block;
  font-size: 1.05rem;
  margin-bottom: 0.15rem;
}

.chatbot-header small {
  display: block;
  font-size: 0.8rem;
  color: #ffffff;
  opacity: 1;
  font-weight: 400;
}

.chatbot-close {
  background: rgba(255, 255, 255, 0.15);
  border: none;
  color: #ffffff;
  width: 32px;
  height: 32px;
  border-radius: 50%;
  cursor: pointer;
  font-size: 1.3rem;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.2s ease;
  line-height: 1;
  padding: 0;
}

.chatbot-close:hover {
  background: rgba(255, 255, 255, 0.25);
  transform: scale(1.1);
}

/* Messages Area */
.chatbot-messages {
  flex: 1;
  overflow-y: auto;
  padding: 1.2rem;
  display: flex;
  flex-direction: column;
  gap: 0.85rem;
  scroll-behavior: smooth;
  background: var(--bg);
}

.chatbot-messages .chat-bubble {
  max-width: 85%;
  animation: chatBubbleIn 0.22s ease;
}

/* Status/Typing Indicator */
.chatbot-status {
  display: flex;
  align-items: center;
  gap: 0.6rem;
  padding: 0.6rem 1.2rem;
  background: var(--surface-alt);
  border-top: 1px solid var(--line);
  font-size: 0.85rem;
  color: var(--muted);
}

/* Input Container */
.chatbot-input-container {
  padding: 1rem;
  background: var(--surface);
  border-top: 1px solid var(--line);
}

.chatbot-form {
  display: flex;
  gap: 0.6rem;
  align-items: center;
}

.chatbot-input {
  flex: 1;
  padding: 0.75rem 1rem;
  border: 1px solid var(--line);
  border-radius: 24px;
  background: var(--bg);
  color: var(--text);
  font-size: 0.95rem;
  outline: none;
  transition: all 0.2s ease;
}

.chatbot-input:focus {
  border-color: var(--primary);
  box-shadow: 0 0 0 3px rgba(42, 157, 143, 0.1);
}

.chatbot-input:disabled {
  opacity: 0.6;
  cursor: not-allowed;
}

.chatbot-send {
  width: 44px;
  height: 44px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--primary) 0%, var(--primary-strong) 100%);
  color: #ffffff;
  border: none;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.2rem;
  transition: all 0.2s ease;
  flex-shrink: 0;
}

.chatbot-send:hover:not(:disabled) {
  transform: scale(1.1);
  box-shadow: 0 6px 16px rgba(42, 157, 143, 0.3);
}

.chatbot-send:active:not(:disabled) {
  transform: scale(0.95);
}

.chatbot-send:disabled {
  opacity: 0.5;
  cursor: not-allowed;
}

/* Mobile Responsive */
@media (max-width: 480px) {
  .chatbot-widget {
    bottom: 16px;
    right: 16px;
  }

  .chatbot-toggle {
    width: 56px;
    height: 56px;
    font-size: 1.5rem;
  }

  .chatbot-window {
    width: calc(100vw - 32px);
    height: calc(100vh - 100px);
    bottom: 72px;
  }

  .chatbot-header {
    padding: 1rem;
  }

  .chatbot-messages {
    padding: 1rem;
  }

  .chatbot-input-container {
    padding: 0.75rem;
  }
}
</style>

<script>
(function() {
  'use strict';

  const chatScope = '{{ current_user.role if current_user else "public" }}';
  const chatEndpoint = '{{ url_for("chatbot.chat", scope=current_user.role if current_user else "public") }}';
  
  const toggleBtn = document.getElementById('chatbotToggle');
  const chatWindow = document.getElementById('chatbotWindow');
  const messagesContainer = document.getElementById('chatbotMessages');
  const chatForm = document.getElementById('chatbotForm');
  const chatInput = document.getElementById('chatbotInput');
  const sendBtn = document.getElementById('chatbotSend');
  const statusDiv = document.getElementById('chatbotStatus');

  let isSending = false;

  
  window.toggleChatbotWidget = function(show) {
    const isOpen = show !== undefined ? show : !chatWindow.classList.contains('active');
    
    if (isOpen) {
      chatWindow.classList.add('active');
      toggleBtn.classList.add('active');
      chatInput.focus();
    } else {
      chatWindow.classList.remove('active');
      toggleBtn.classList.remove('active');
    }
  };

  toggleBtn.addEventListener('click', function() {
    toggleChatbotWidget();
  });

  
  function scrollToBottom() {
    messagesContainer.scrollTop = messagesContainer.scrollHeight;
  }

  
  function addMessage(text, role) {
    const bubble = document.createElement('div');
    bubble.className = 'chat-bubble ' + role + ' chat-bubble-fresh';
    bubble.textContent = text;
    messagesContainer.appendChild(bubble);
    scrollToBottom();
    return bubble;
  }

  
  function setTyping(isTyping) {
    statusDiv.style.display = isTyping ? 'flex' : 'none';
    if (isTyping) {
      scrollToBottom();
    }
  }

  
  function setSending(sending) {
    isSending = sending;
    chatInput.disabled = sending;
    sendBtn.disabled = sending;
    setTyping(sending);
  }

  
  async function sendMessage(message) {
    if (!message.trim() || isSending) {
      return;
    }

    
    addMessage(message, 'user');
    chatInput.value = '';
    setSending(true);

    try {
      const formData = new FormData();
      formData.append('question', message);

      const response = await fetch(chatEndpoint, {
        method: 'POST',
        headers: {
          'X-Requested-With': 'XMLHttpRequest',
          'Accept': 'application/json'
        },
        body: formData
      });

      const data = await response.json();

      if (!response.ok || !data.ok) {
        throw new Error(data.error || 'Unable to reach the assistant right now.');
      }

      
      const assistantText = (data.assistant_message && data.assistant_message.content) 
        || data.assistant_message 
        || 'I could not generate a response.';

      addMessage(assistantText, 'assistant');
      setSending(false);

    } catch (error) {
      console.error('Chat error:', error);
      addMessage(
        error.message || 'Oops, something went wrong. Please try again.',
        'assistant'
      );
      setSending(false);
    }

    chatInput.focus();
  }

  
  chatForm.addEventListener('submit', function(e) {
    e.preventDefault();
    const message = chatInput.value.trim();
    if (message) {
      sendMessage(message);
    }
  });

  
  chatInput.addEventListener('keydown', function(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      chatForm.dispatchEvent(new Event('submit'));
    }
  });

  console.log('🐾 AI Pet Care Assistant widget loaded. Chat scope:', chatScope);
})();
</script>
{% endif %}
